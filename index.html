<!DOCTYPE html>
<html>
<head>
<style>

body{
    font-family:Arial;
}

.box{
    width:200px;
    height:100px;
    background-color:skyblue;
}

/* Individual Margin Properties */
.box1{
    margin-top:40px;
    margin-right:20px;
    margin-bottom:40px;
    margin-left:60px;
}

/* One Value */
.box2{
    margin:30px;
}

/* Two Values */
/* top-bottom | left-right */
.box3{
    margin:20px 60px;
}

/* Three Values */
/* top | left-right | bottom */
.box4{
    margin:20px 40px 60px;
}

/* Four Values */
/* top | right | bottom | left */
.box5{
    margin:20px 30px 40px 50px;
}

/* Auto Margin */
.box6{
    width:250px;
    margin:auto;
}

/* Negative Margin */
.box7{
    margin-top:-20px;
}

</style>
</head>

<body>

<div class="box box1">Box 1</div>
<div class="box box2">Box 2</div>
<div class="box box3">Box 3</div>
<div class="box box4">Box 4</div>
<div class="box box5">Box 5</div>
<div class="box box6">Centered Box</div>
<div class="box box7">Negative Margin</div>

</body>
</html>
